syntax = "proto3";

option csharp_namespace = "Loyalty.Grpc";

package loyalty;

enum LoyaltyRankProto {//Create an enum to represent the loyalty ranks
  LOYALTY_RANK_PROTO_UNSPECIFIED = 0;
  BRONZE = 1;
  SILVER = 2;
  GOLD = 3;
  DIAMOND = 4;
}

service LoyaltyService {//Decalre service by using gRPC. its considered as a contract between client and server. It defines the methods that can be called by the client and the parameters that can be passed to those methods.
  rpc PreviewBenefits (PreviewBenefitsRequest) returns (PreviewBenefitsResponse);//defines input/output of methods. its called a message also.
  rpc CompleteOrder (CompleteOrderRequest) returns (CompleteOrderResponse);
}
//From client
message PreviewBenefitsRequest {//define the message that will be sent from the client to the server when calling the PreviewBenefits method. It contains the userId, currentPoints, and subtotalAfterCoupon fields.
  string userId = 1;//For server recognize who is talking to them 
  int32 currentPoints = 2; //THe current points of user
  double subtotalAfterCoupon = 3; // The subtotal after minus the coupon discount.
}//This method is the request from client to server to preview the benefits of the loyalty program based on the user's current points and the subtotal after applying any coupons. The server will use this information to calculate the user's loyalty rank, the discount percentage, and the discount amount that they would receive if they were to complete their order.

message PreviewBenefitsResponse {//This is a response message that will be sent from the server to the client after processing the PreviewBenefitsRequest. It contains the rank, rankDiscountPercent, and rankDiscountAmount fields. The server will use the user's current points and subtotal after coupon to determine their loyalty rank and calculate the corresponding discount percentage and amount that they would receive if they were to complete their order.
  LoyaltyRankProto rank = 1; 
  double rankDiscountPercent = 2;
  double rankDiscountAmount = 3;
}//after the server got the request from the client. Now the servver will process the request and caculate the rank, this discount percentage of the rank and the detail discount amount 

message CompleteOrderRequest {//After the user paid and got the successfull order. This request will be sent to server. With:
  string userId = 1;//UserId of this complete order
  int32 currentPoints = 2;//Currently point of this user
  double completedOrderAmount = 3;//How much of this successful order.
}

message CompleteOrderResponse {//The server would recevie the reuqest and start processing the order. Anh will send back the respons to client with:
  int32 earnedPoints = 1;//How much point the user could earn from the order.
  int32 totalPoints = 2;//Total points of this user after this order: currentPoints + earnedPoints
  LoyaltyRankProto newRank = 3;//If the user has enough point to upgrade the rank after this order, the rank will be updated. If not, the rank will stay the same as before.
  double nextRankDiscountPercent = 4;//The discount percentage for the next rank, if the user is close to reaching it.
}
